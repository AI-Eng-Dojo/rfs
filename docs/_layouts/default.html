<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.summary | default: site.description | escape }}">
    <style>
      :root {
        --bg: #fffaf0;
        --surface: #ffffff;
        --ink: #1f2933;
        --muted: #5f6b7a;
        --line: #d9e2ec;
        --accent: #f5a524;
        --accent-dark: #9a5b00;
        --green: #5f8f3f;
        --blue: #2f80a8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      a {
        color: var(--blue);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }

      .site-header {
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
      }

      .site-header-inner,
      main,
      .site-footer-inner {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
      }

      .site-header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 72px;
        gap: 16px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--ink);
        font-weight: 750;
        text-decoration: none;
      }

      .brand img {
        width: 40px;
        height: 40px;
        border-radius: 8px;
      }

      .site-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        font-size: 14px;
      }

      main {
        padding: 42px 0 64px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 28px;
        padding: 18px 0 34px;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 64px);
        line-height: 1.02;
      }

      .hero p {
        max-width: 720px;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 18px;
      }

      .hero img {
        width: min(210px, 28vw);
        min-width: 120px;
        border-radius: 8px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        margin: 18px 0 22px;
      }

      .search-input {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--surface);
        color: var(--ink);
        font: inherit;
      }

      .count {
        color: var(--muted);
        font-size: 14px;
        white-space: nowrap;
      }

      .idea-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
        gap: 16px;
      }

      .idea-card {
        display: flex;
        flex-direction: column;
        min-height: 210px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
        background: var(--surface);
      }

      .idea-card h2 {
        margin: 0;
        font-size: 21px;
        line-height: 1.25;
      }

      .idea-card p {
        margin: 12px 0 0;
        color: var(--muted);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: auto;
        padding-top: 18px;
      }

      .tag {
        border: 1px solid #cbd5a9;
        border-radius: 999px;
        padding: 2px 8px;
        color: var(--green);
        font-size: 13px;
        line-height: 1.6;
      }

      .empty-state {
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--muted);
      }

      .page-content {
        max-width: 760px;
      }

      .page-content h1 {
        margin-top: 0;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 1.08;
      }

      .page-content h2 {
        margin-top: 34px;
        border-top: 1px solid var(--line);
        padding-top: 22px;
      }

      .page-content img {
        max-width: 100%;
      }

      .site-footer {
        border-top: 1px solid var(--line);
        background: #ffffff;
      }

      .site-footer-inner {
        padding: 22px 0;
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 720px) {
        .site-header-inner,
        .hero,
        .toolbar {
          grid-template-columns: 1fr;
        }

        .site-header-inner {
          align-items: flex-start;
          padding: 14px 0;
        }

        .hero img {
          order: -1;
          width: 132px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <img src="{{ '/icon.png' | relative_url }}" alt="" aria-hidden="true">
          <span>{{ site.title }}</span>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}">Ideas</a>
          <a href="https://github.com/AI-Eng-Dojo/rfs">Repository</a>
        </nav>
      </div>
    </header>

    <main>
      {% if page.url == "/" %}
        {{ content }}
      {% else %}
        <article class="page-content">
          {{ content }}
        </article>
      {% endif %}
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        Independent project inspired by YC Requests for Startups. Not affiliated with Y Combinator.
      </div>
    </footer>
  </body>
</html>
